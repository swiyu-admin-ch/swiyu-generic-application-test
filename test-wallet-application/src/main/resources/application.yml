spring:
  application.name: swiyu-test-wallet
  jackson.default-property-inclusion: NON_NULL

logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG

application:
  issuer:
    base-image: "swiyu-issuer"
    image-tag: "local"
    signed-metadata: true
  verifier:
    base-image: "swiyu-verifier"
    image-tag: "local"
  trace: "${TRACE_TEST_REQUESTS:false}"
