spring:
  application.name: swiyu-test-wallet
  jackson.default-property-inclusion: NON_NULL

logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG

application:
  issuer:
    base-image: "${APPLICATION_ISSUER_BASE_IMAGE:ghcr.io/swiyu-admin-ch/swiyu-issuer}"
    image-tag: "${APPLICATION_ISSUER_IMAGE_TAG:dev}"
    signed-metadata: true
  verifier:
    base-image: "${APPLICATION_VERIFIER_BASE_IMAGE:ghcr.io/swiyu-admin-ch/swiyu-verifier}"
    image-tag: "${APPLICATION_VERIFIER_IMAGE_TAG:dev}"
  trace: "${TRACE_TEST_REQUESTS:false}"