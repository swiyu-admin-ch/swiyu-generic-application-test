name: Run E2E Tests (Alternative with Native GitHub Features)

on:
  workflow_dispatch:
    inputs:
      issuer-image-tag:
        description: 'Issuer Docker image tag'
        required: false
        default: 'stable'
      verifier-image-tag:
        description: 'Verifier Docker image tag'
        required: false
        default: 'stable'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    env:
      ISSUER_IMAGE_TAG: ${{ github.event.inputs['issuer-image-tag'] }}
      VERIFIER_IMAGE_TAG: ${{ github.event.inputs['verifier-image-tag'] }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - name: Configure Docker Java client API version
        run: echo "api.version=1.44" > ~/.docker-java.properties
      - name: Build and verify with Maven
        run: mvn --batch-mode verify
      
      # Native GitHub Test Reporting mit mikepenz/action-junit-report
      - name: Publish Test Report (Native)
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: '**/target/surefire-reports/TEST-*.xml,**/target/failsafe-reports/TEST-*.xml'
          detailed_summary: true
          include_passed: true
          check_name: 'Test Results'
          fail_on_failure: false
      
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/*.xml
            **/target/failsafe-reports/*.xml
          retention-days: 30

