name: "Advanced CodeQL Configuration"

queries:
  - name: java-security-extended
    uses: java-security-extended
  - name: java-security-and-quality
    uses: java-security-and-quality

# Additional queries for extended security analysis
query-filters:
  - include:
      kind: problem
  - include:
      kind: path-problem
  - include:
      severity: ["high", "error", "warning"]  # Only high, errors and warnings
  - exclude:
      id: java/deprecated-call # Exclude deprecated calls because of V1 version
  - exclude:
      id: java/potentially-weak-cryptographic-algorithm # The cryptographic choices in this codebase are deliberate (OpenID specs & Swiss profile)

# Extended analysis options
disable-default-queries: false

build-mode: manual